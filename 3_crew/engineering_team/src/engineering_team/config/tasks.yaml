design_task:
  description: >
    Pegue os requisitos de alto nível descritos aqui e prepare um design detalhado para o engenheiro;
    tudo deve estar em 1 módulo Python, mas detalhe as classes e métodos no módulo.
    Aqui estão os requisitos: {requirements}
    IMPORTANTE: Forneça apenas o design em formato Markdown, detalhando as classes e funções do módulo e descrevendo a funcionalidade.
  expected_output: >
    Um design detalhado para o engenheiro, identificando as classes e funções no módulo.
  agent: engineering_lead
  output_file: output/{module_name}_design.md

code_task:
  description: >
    Escreva um módulo Python que implemente o design descrito pelo líder de engenharia, a fim de atender aos requisitos.
    Aqui estão os requisitos: {requirements}
  expected_output: >
    Um módulo Python que implementa o design e atende aos requisitos.
    IMPORTANTE: Forneça APENAS o código Python puro, sem qualquer formatação em Markdown, delimitadores de bloco de código ou crases.
    A saída deve ser um código Python válido que possa ser salvo diretamente em um arquivo e executado.
  agent: backend_engineer
  context:
    - design_task
  output_file: output/{module_name}

frontend_task:
  description: >
    Escreva uma interface Gradio em um módulo app.py que demonstre a classe de backend fornecida em {module_name}.
    Presuma que há apenas 1 usuário e mantenha a interface bem simples — apenas um protótipo ou demonstração.
    Aqui estão os requisitos: {requirements}
  expected_output: >
    Uma interface Gradio no módulo app.py que demonstre a classe de backend fornecida.
    O arquivo deve estar pronto para ser executado como está, no mesmo diretório que o módulo de backend, e deve importar a classe de backend de {module_name}.
    IMPORTANTE: Forneça APENAS o código Python puro, sem qualquer formatação em Markdown, delimitadores de bloco de código ou crases.
    A saída deve ser um código Python válido que possa ser salvo diretamente em um arquivo e executado.
  agent: frontend_engineer
  context:
    - code_task
  output_file: output/app.py

test_task:
  description: >
    Escreva testes unitários para o módulo de backend {module_name} e crie um test_{module_name} no mesmo diretório que o módulo de backend.
  expected_output: >
    Um módulo test_{module_name} que testa o módulo de backend fornecido.
    IMPORTANTE: Forneça APENAS o código Python puro, sem qualquer formatação em Markdown, delimitadores de bloco de código ou crases.
    A saída deve ser um código Python válido que possa ser salvo diretamente em um arquivo e executado.
  agent: test_engineer
  context:
    - code_task
  output_file: output/test_{module_name}
