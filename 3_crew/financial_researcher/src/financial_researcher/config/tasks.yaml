# src/research_crew/config/tasks.yaml
research_task:
  description: >
    Conduza uma pesquisa aprofundada sobre a empresa {company}. Foque em:
    1. Situação e saúde atuais da empresa
    2. Desempenho histórico da empresa
    3. Principais desafios e oportunidades
    4. Notícias e eventos recentes
    5. Perspectivas futuras e possíveis desenvolvimentos

    Certifique-se de organizar suas descobertas em um formato estruturado, com seções claras.
  expected_output: >
    Um documento de pesquisa abrangente, com seções bem organizadas, cobrindo
    todos os aspectos solicitados de {company}. Inclua fatos, números
    e exemplos específicos quando pertinente.
  agent: researcher

analysis_task:
  description: >
    Analise as descobertas da pesquisa e crie um relatório abrangente sobre {company}.
    Seu relatório deve:
    1. Começar com um resumo executivo
    2. Incluir todas as informações-chave da pesquisa
    3. Fornecer uma análise perspicaz de tendências e padrões
    4. Oferecer uma visão do mercado para a empresa, observando que isso não deve ser usado para decisões de negociação
    5. Estar formatado em um estilo profissional e de fácil leitura, com títulos claros
  expected_output: >
    Um relatório profissional e refinado sobre {company} que apresente as descobertas
    da pesquisa com análise e insights adicionais. O relatório deve ser bem estruturado,
    com um resumo executivo, seções principais e conclusão.
  agent: analyst
  context:
    - research_task
  output_file: output/report.md
