find_trending_companies:
  description: >
    Monitore as últimas notícias brasileiras, comunicados da CVM e fatos relevantes para encontrar empresas de {sector} listadas na B3
    que estejam ganhando destaque. Priorize companhias novas que ainda não apareceram nas análises anteriores.
  expected_output: >
    Uma lista de empresas em destaque nas notícias em {sector}
  agent: trending_company_finder
  output_file: output/trending_companies.json

research_trending_companies:
  description: >
    Diante da lista de empresas brasileiras em destaque, pesquise fontes locais e internacionais para detalhar fundamentos, governança,
    riscos macro/regulatórios e perspectivas de cada companhia listada na B3.
  expected_output: >
    Um relatório contendo análise detalhada de cada empresa
  agent: financial_researcher
  context:
    - find_trending_companies
  output_file: output/research_report.json

pick_best_company:
  description: >
    Analise as conclusões à luz do mercado brasileiro e selecione a empresa da B3 com melhor relação risco-retorno vs. Selic/CDI.
    Envie uma notificação push para o usuário com a decisão e uma justificativa de 1 frase.
    Em seguida responda com relatório detalhado sobre o racional, mencionando empresas descartadas e motivos (liquidez, valuation,
    exposição regulatória, etc.).
  expected_output: >
    A empresa escolhida e por que foi escolhida; as empresas que não foram selecionadas e por que não foram selecionadas.
  agent: stock_picker
  context:
    - research_trending_companies
  output_file: output/decision.md
