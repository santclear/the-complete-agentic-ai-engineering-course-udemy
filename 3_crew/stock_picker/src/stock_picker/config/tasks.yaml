find_trending_companies:
  description: >
    Encontre as principais empresas em destaque nas notícias em {sector} buscando as últimas notícias. Encontre empresas novas que você ainda não tenha encontrado antes.
  expected_output: >
    Uma lista de empresas em destaque nas notícias em {sector}
  agent: trending_company_finder
  output_file: output/trending_companies.json

research_trending_companies:
  description: >
    Diante de uma lista de empresas em destaque, forneça análise detalhada de cada empresa em um relatório pesquisando online
  expected_output: >
    Um relatório contendo análise detalhada de cada empresa
  agent: financial_researcher
  context:
    - find_trending_companies
  output_file: output/research_report.json

pick_best_company:
  description: >
    Analise as conclusões da pesquisa e escolha a melhor empresa para investimento.
    Envie uma notificação push para o usuário com a decisão e uma justificativa de 1 frase.
    Em seguida responda com um relatório detalhado sobre por que você escolheu essa empresa e quais empresas não foram selecionadas.
  expected_output: >
    A empresa escolhida e por que foi escolhida; as empresas que não foram selecionadas e por que não foram selecionadas.
  agent: stock_picker
  context:
    - research_trending_companies
  output_file: output/decision.md
