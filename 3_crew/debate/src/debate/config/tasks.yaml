propose:
  description: >
    Você está propondo a moção: {motion}.
    Apresente um argumento claro a favor da moção.
    Seja muito convincente.
  expected_output: >
    Seu argumento claro a favor da moção, de forma concisa.
  agent: debater
  output_file: output/propose.md

oppose:
  description: >
    Você está em oposição à moção: {motion}.
    Apresente um argumento claro contra a moção.
    Seja muito convincente.
  expected_output: >
    Seu argumento claro contra a moção, de forma concisa.
  agent: debater
  output_file: output/oppose.md
decide:
  description: >
    Analise os argumentos apresentados pelos debatedores e decida qual lado é mais convincente.
  expected_output: >
    Sua decisão sobre qual lado é mais convincente e o motivo.
  agent: judge
  output_file: output/decide.md
